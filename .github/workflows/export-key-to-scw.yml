name: Export EB Key to Scaleway

on:
  workflow_dispatch:
  push:
    branches:
      - claude/analyze-mcp-banking-oauth-dIdei
    paths:
      - '.github/workflows/export-key-to-scw.yml'

jobs:
  export-key:
    name: Export Enable Banking Key to Scaleway Secret Manager
    runs-on: ubuntu-latest
    steps:
      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh
          scw version

      - name: Create secret in Scaleway
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_PROJECT_ID }}
          ENABLE_PRIVATE_KEY: ${{ secrets.ENABLE_PRIVATE_KEY }}
        run: |
          # Create the secret (ignore error if already exists)
          scw secret secret create \
            name=adhd-budget-enable-banking-key \
            description="Enable Banking RSA private key for ADHD Budget app" \
            tags.0=adhd-budget \
            tags.1=enable-banking \
            region=fr-par 2>/dev/null || echo "Secret already exists, adding new version"

          # Get the secret ID
          SECRET_ID=$(scw secret secret list name=adhd-budget-enable-banking-key region=fr-par -o json | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          echo "Secret ID: $SECRET_ID"

          # Create a new version with the key data
          echo -n "$ENABLE_PRIVATE_KEY" | base64 | scw secret version create \
            secret-id=$SECRET_ID \
            data=- \
            description="Exported from GitHub secrets $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            region=fr-par

          echo "Key exported successfully to Scaleway Secret Manager"
