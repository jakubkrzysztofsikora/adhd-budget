name: Export EB Key to Scaleway

on:
  workflow_dispatch:
  push:
    branches:
      - claude/analyze-mcp-banking-oauth-dIdei
    paths:
      - '.github/workflows/export-key-to-scw.yml'

jobs:
  export-key:
    name: Export Enable Banking Key to Scaleway Secret Manager
    runs-on: ubuntu-latest
    steps:
      - name: Install Scaleway CLI
        run: |
          curl -s https://raw.githubusercontent.com/scaleway/scaleway-cli/master/scripts/get.sh | sh

      - name: Store key in Scaleway
        env:
          SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
          SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
          SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_PROJECT_ID }}
          SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_PROJECT_ID }}
          ENABLE_PRIVATE_KEY: ${{ secrets.ENABLE_PRIVATE_KEY }}
        run: |
          SECRET_ID="f640b63d-2299-436c-b8e1-b0ac36367d61"

          # Write key to temp file, base64 encode it properly
          echo "$ENABLE_PRIVATE_KEY" > /tmp/eb_key.pem
          B64_DATA=$(base64 -w 0 /tmp/eb_key.pem)

          # Create new version with proper base64 data
          scw secret version create \
            secret-id=$SECRET_ID \
            data="$B64_DATA" \
            description="Re-exported $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            region=fr-par

          # Verify
          VERIFY=$(scw secret version access $SECRET_ID revision=latest raw=true region=fr-par)
          if echo "$VERIFY" | grep -q "BEGIN"; then
            echo "Key verified successfully"
          else
            echo "ERROR: Key verification failed"
            exit 1
          fi

          rm -f /tmp/eb_key.pem
