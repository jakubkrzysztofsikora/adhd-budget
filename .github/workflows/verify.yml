name: Verify T&S Gates

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # S1 Gate: Secret Scanning
  secrets-scan:
    name: S1 - Secrets Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Custom secrets audit
        run: |
          chmod +x tests/shell/scan_git_secrets.sh
          tests/shell/scan_git_secrets.sh

  # MCP Server: Build + Unit Tests
  mcp-unit-tests:
    name: MCP - Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci
      - name: Build
        working-directory: mcp-server
        run: npm run build
      - name: Unit tests
        working-directory: mcp-server
        run: npm test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-unit-test-results
          path: mcp-server/reports/

  # MCP Server: Integration Tests
  mcp-integration-tests:
    name: MCP - Integration Tests
    runs-on: ubuntu-latest
    needs: [mcp-unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci
      - name: Build
        working-directory: mcp-server
        run: npm run build
      - name: Integration tests
        working-directory: mcp-server
        run: npm run test:integration

  # S4 Gate: Container Security
  container-security:
    name: S4 - Container Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Dockerfile security
        run: |
          chmod +x tests/shell/check_compose_security.sh
          tests/shell/check_compose_security.sh

  # Docker: Build MCP Server Image
  docker-build:
    name: Docker - Build MCP Image
    runs-on: ubuntu-latest
    needs: [mcp-unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build MCP server image
        run: |
          docker build -t adhd-budget-mcp-server ./mcp-server
      - name: Test Docker image health
        run: |
          docker run -d --name mcp-test -p 8081:8081 adhd-budget-mcp-server
          sleep 3
          curl -sf http://localhost:8081/health | grep -q '"status":"ok"'
          docker rm -f mcp-test

  # Deployment to VPS
  deploy-to-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [secrets-scan, mcp-unit-tests, mcp-integration-tests, container-security, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Create deployment archive
        run: |
          mkdir -p keys
          echo "Keys directory for Enable Banking" > keys/README.md
          tar -czf deploy.tar.gz docker-compose.yml mcp-server/ Caddyfile.prod Caddyfile.test Dockerfile.caddy-secure Dockerfile keys/ .env.example
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "deploy.tar.gz"
          target: "/home/${{ secrets.VPS_USER }}/"
      - name: Deploy
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /home/${{ secrets.VPS_USER }}
            mkdir -p adhd-budget
            tar -xzf deploy.tar.gz -C adhd-budget/
            cd adhd-budget

            cp Caddyfile.prod Caddyfile

            # Write Enable Banking private key
            if [ -n "${{ secrets.ENABLE_PRIVATE_KEY }}" ]; then
              mkdir -p keys
              echo "${{ secrets.ENABLE_PRIVATE_KEY }}" > keys/enablebanking_private.pem
              chmod 644 keys/enablebanking_private.pem
            fi

            # Create .env
            printf '%s\n' \
              "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}" \
              "ENABLE_APP_ID=${{ secrets.ENABLE_APP_ID }}" \
              "ENABLE_PRIVATE_KEY_PATH=/app/keys/enablebanking_private.pem" \
              "ENABLE_API_BASE_URL=${{ secrets.ENABLE_API_BASE_URL }}" \
              "EXTERNAL_URL=https://adhdbudget.bieda.it" \
              "ASPSP_NAME=${{ secrets.ASPSP_NAME }}" \
              "ASPSP_COUNTRY=${{ secrets.ASPSP_COUNTRY }}" \
              "CADDYFILE=./Caddyfile" \
              > .env

            docker compose down --remove-orphans || true
            docker rm -f adhd-budget-x-mcp-server-1 2>/dev/null || true
            docker compose --env-file .env up -d --build
            sleep 15
            docker compose ps
            curl -sf http://localhost:8081/health || echo "Health check failed"

  # Gates Status
  gates-status:
    name: Gates Status Check
    runs-on: ubuntu-latest
    needs: [secrets-scan, mcp-unit-tests, mcp-integration-tests, container-security, docker-build]
    if: always()
    steps:
      - name: Check gate results
        run: |
          echo "Gate Results:"
          echo "S1 (Secrets): ${{ needs.secrets-scan.result }}"
          echo "MCP Unit: ${{ needs.mcp-unit-tests.result }}"
          echo "MCP Integration: ${{ needs.mcp-integration-tests.result }}"
          echo "S4 (Container): ${{ needs.container-security.result }}"
          echo "Docker Build: ${{ needs.docker-build.result }}"

          if [[ "${{ needs.secrets-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.mcp-unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.container-security.result }}" == "failure" ]]; then
            echo "Critical gates failed!"
            exit 1
          else
            echo "All critical gates passed!"
          fi
