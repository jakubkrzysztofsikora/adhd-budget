# Shared MCP server build definition (top-level extension)
x-mcp-server: &mcp-server-base
  build:
    context: ./mcp-server
    dockerfile: Dockerfile
  volumes:
    - ./keys:/app/keys:ro
  restart: unless-stopped
  user: "node"
  mem_limit: 256m
  cpus: '0.5'
  cap_drop:
    - ALL

services:
  db:
    image: postgres:15-alpine@sha256:987b242173006d6df08506f10b967a71478a3610664cfefbc49b9c775d3d0eed
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: budget_user
      POSTGRES_DB: adhd_budget
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    cpus: '0.5'
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - DAC_OVERRIDE

  # Bank: Mock ASPSP (sandbox/dev — default)
  mcp-server:
    <<: *mcp-server-base
    environment:
      PORT: "8081"
      HOST: "0.0.0.0"
      ASPSP_NAME: ${ASPSP_NAME:-MOCKASPSP_SANDBOX}
      ASPSP_COUNTRY: ${ASPSP_COUNTRY:-FI}
      EXTERNAL_URL: ${EXTERNAL_URL:-http://localhost:8081}
      ENABLE_APP_ID: ${ENABLE_APP_ID:-}
      ENABLE_PRIVATE_KEY_PATH: ${ENABLE_PRIVATE_KEY_PATH:-}
      ENABLE_API_BASE_URL: ${ENABLE_API_BASE_URL:-https://api.enablebanking.com}
      DATA_DIR: /app/data
    ports:
      - "8081:8081"
    volumes:
      - ./keys:/app/keys:ro
      - mcp_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  reverse-proxy:
    build:
      context: .
      dockerfile: Dockerfile.caddy-secure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CADDYFILE:-./Caddyfile.test}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    mem_limit: 128m
    cpus: '0.25'
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      - mcp-server
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine@sha256:bb186d083732f669da90be8b0f975a37812b15e913465bb14d845db72a4e3e08
    user: "999:999"
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    mem_limit: 128m
    cpus: '0.25'
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
  caddy_data:
  caddy_config:
  mcp_data:

networks:
  default:
    name: adhd_budget_network
